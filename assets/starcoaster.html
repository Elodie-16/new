<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Coaster - Accueil</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        .hero {
            background: url('/assets/img/cielsoleil.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .logo-top-left {
            position: absolute; top: 20px; left: 20px; width: 60px;
        }
        .hero-logo {
            margin-bottom: 20px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            color: #1a2a6c;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .g-title { font-weight: bold; font-size: 1.2rem; margin-bottom: 15px; }
        .bulle-jouer {
            margin-top: 30px;
            padding: 15px 50px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background: #FFD700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .bulle-jouer:hover { transform: scale(1.1); background: #ffcc00; }
    </style>
</head>
<body>
    <main class="hero">
        <img src="/assets/img/licorne.png" class="logo-top-left" alt="Logo">
        <img src="/assets/img/tête-de-licorne-2.png" alt="Logo du jeu" class="hero-logo" width="280">
        
        <section class="glass-panel">
            <p class="g-title">Bienvenue dans le jeu des montagnes Russes !</p>
            <p><strong>Ta mission :</strong></p>
            <p>Guide la licorne jusqu'au bout du parcours...</p>
            <p>Attention : ne la laisse surtout pas tomber !</p>
            <p style="font-size: 0.9rem; margin-top: 10px; opacity: 0.8;">Appuie sur la touche espace pour jouer</p>
        </section>

        <button class="bulle-jouer" onclick="window.location.href='montagnes.html'">JOUER</button>
    </main>
</body>
</html>
