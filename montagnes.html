<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Star Coaster Licorne - Les 3 Niveaux</title>
    <link rel="stylesheet" href="assets/montagnes.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body class="game-page">
    <canvas id="gameCanvas"></canvas>

    <div class="pixel-hud">
        <div class="hud-header">
            <img src="assets/img/licornee.png" class="mini-logo" alt="avatar">
            <div class="elements-column">
                <div class="level-row"><span>NIVEAU</span><span id="level-display">1</span></div>
                <div class="hud-row"><span>VIES</span><div id="lives-container" class="hearts-row"></div></div>
                <div class="hud-row"><span>STARS</span><span id="val-stars">0</span></div>
                <div class="hud-row"><span>PIÈCES</span><span id="val-coins">0</span></div>
            </div>
        </div>
    </div>

    <div id="end-screen" class="overlay" style="display: none;">
        <div class="modal">
            <div id="modal-content"></div>
        </div>
    </div>

    <script src="assets/montagnes.js"></script>
</body>
</html>
